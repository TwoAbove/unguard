id: no-logical-or-literal-fallback
language: TypeScript
severity: warning
message: Logical-or literal defaults can hide missing guarantees; validate and normalize at boundaries
rule:
  any:
    - pattern: $VALUE || ""
    - pattern: $VALUE || ''
    - pattern: $VALUE || 0
    - pattern: $VALUE || false
    - pattern: $VALUE || []
    - pattern: $VALUE || {}
