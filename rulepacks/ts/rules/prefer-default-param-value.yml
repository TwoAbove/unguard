id: prefer-default-param-value
language: TypeScript
severity: warning
message: Optional param is immediately defaulted in the body; use a default parameter value instead
rule:
  any:
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { $$$H\n  const $V = $NAME ?? $D; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { $$$H\n  const $V = $NAME || $D; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { $$$H\n  let $V = $NAME ?? $D; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { $$$H\n  let $V = $NAME || $D; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { $$$H\n  $NAME = $NAME ?? $D; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { $$$H\n  $NAME = $NAME || $D; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { $$$H\n  const $V = $NAME ?? $D; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { $$$H\n  const $V = $NAME || $D; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { $$$H\n  let $V = $NAME ?? $D; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { $$$H\n  let $V = $NAME || $D; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { $$$H\n  $NAME = $NAME ?? $D; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { $$$H\n  $NAME = $NAME || $D; $$$R }"
