id: prefer-required-param-with-guard
language: TypeScript
severity: warning
message: Optional param is immediately guarded; make the param required and validate at the call site
rule:
  any:
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { if (!$NAME) return $$$RV; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { if (!$NAME) { return $$$RV; } $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { if ($NAME === undefined) throw $E; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { if ($NAME === undefined) { throw $E; } $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { if ($NAME == null) throw $E; $$$R }"
    - pattern: "function $FN($$$B, $NAME?: $TYPE) { if ($NAME == null) { throw $E; } $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { if (!$NAME) return $$$RV; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { if (!$NAME) { return $$$RV; } $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { if ($NAME === undefined) throw $E; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { if ($NAME === undefined) { throw $E; } $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { if ($NAME == null) throw $E; $$$R }"
    - pattern: "($$$B, $NAME?: $TYPE) => { if ($NAME == null) { throw $E; } $$$R }"
