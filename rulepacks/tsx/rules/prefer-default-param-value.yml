id: prefer-default-param-value
language: Tsx
severity: warning
message: Optional param is immediately defaulted in the body; use a default
  parameter value instead
rule:
  any:
    - pattern: |-
        function $FN($$$B, $NAME?: $TYPE) { $$$H
          const $V = $NAME ?? $D; $$$R }
    - pattern: |-
        function $FN($$$B, $NAME?: $TYPE) { $$$H
          const $V = $NAME || $D; $$$R }
    - pattern: |-
        function $FN($$$B, $NAME?: $TYPE) { $$$H
          let $V = $NAME ?? $D; $$$R }
    - pattern: |-
        function $FN($$$B, $NAME?: $TYPE) { $$$H
          let $V = $NAME || $D; $$$R }
    - pattern: |-
        function $FN($$$B, $NAME?: $TYPE) { $$$H
          $NAME = $NAME ?? $D; $$$R }
    - pattern: |-
        function $FN($$$B, $NAME?: $TYPE) { $$$H
          $NAME = $NAME || $D; $$$R }
    - pattern: |-
        ($$$B, $NAME?: $TYPE) => { $$$H
          const $V = $NAME ?? $D; $$$R }
    - pattern: |-
        ($$$B, $NAME?: $TYPE) => { $$$H
          const $V = $NAME || $D; $$$R }
    - pattern: |-
        ($$$B, $NAME?: $TYPE) => { $$$H
          let $V = $NAME ?? $D; $$$R }
    - pattern: |-
        ($$$B, $NAME?: $TYPE) => { $$$H
          let $V = $NAME || $D; $$$R }
    - pattern: |-
        ($$$B, $NAME?: $TYPE) => { $$$H
          $NAME = $NAME ?? $D; $$$R }
    - pattern: |-
        ($$$B, $NAME?: $TYPE) => { $$$H
          $NAME = $NAME || $D; $$$R }
