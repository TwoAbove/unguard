id: no-null-ternary-normalization
language: Tsx
severity: warning
message: Nullish ternary normalization can hide boundary contracts; enforce shape earlier
rule:
  any:
    - pattern: '$VALUE === null ? null : $EXPR'
    - pattern: '$VALUE !== null ? $EXPR : null'
    - pattern: '$VALUE === undefined ? undefined : $EXPR'
    - pattern: '$VALUE !== undefined ? $EXPR : undefined'
