id: no-null-ternary-normalization
language: Tsx
severity: warning
message: Nullish ternary normalization can hide boundary contracts; enforce
  shape earlier
rule:
  all:
    - kind: ternary_expression
    - has:
        field: condition
        kind: binary_expression
        regex: (===|!==|==|!=).*(null|undefined)|(null|undefined).*(===|!==|==|!=)
    - any:
        - has:
            field: consequence
            matches: is-nullish
        - has:
            field: alternative
            matches: is-nullish
