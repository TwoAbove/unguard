id: no-optional-chaining
snapshots:
  const label = config?.["label"];:
    labels:
    - source: config?.["label"]
      style: primary
      start: 14
      end: 31
  const name = user?.profile?.name;:
    labels:
    - source: user?.profile?.name
      style: primary
      start: 13
      end: 32
  const title = section?.title ?? "Untitled";:
    labels:
    - source: section?.title ?? "Untitled"
      style: primary
      start: 14
      end: 42
  const value = node?.metadata?.id ?? "missing";:
    labels:
    - source: node?.metadata?.id ?? "missing"
      style: primary
      start: 14
      end: 45
  maybeCallback?.(value);:
    labels:
    - source: maybeCallback?.(value)
      style: primary
      start: 0
      end: 22
